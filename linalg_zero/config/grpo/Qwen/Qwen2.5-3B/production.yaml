defaults:
  - /training@training: training_schema
  - /run@run: run_schema
  - _self_
  # Note: _self_ at end means local overrides take precedence
  # engine and torchtune configs use plain dicts (TypedDicts from art.dev, not dataclasses)

init:
  max_lora_rank: 32

training:
  trajectories_per_group: 8
  groups_per_step: 4
  learning_rate: 5e-6
  eval_steps: 100
  val_set_size: 1000
  training_dataset_size: 8000
  num_epochs: 2
  train_mode: sync_rl

run:
  project_id: 001
  project: linalgzero-grpo
  base_model: Qwen/Qwen2.5-3B
  env: linear_algebra
  model_provider: hosted_vllm
  user_model_provider: openai
  model: 001
  user_strategy: mathematician
  user_model: gpt-4o
  agent_strategy: tool-calling-rl
  temperature: 1.0
  task_split: test
  log_dir: rl_results
  skip_eval: False
  in_process: False
  val_task_ids: [1,2,3]

peft:
  r: 32
  lora_alpha: 64
  use_gradient_checkpointing: "unsloth"

# Use peft instead of torchtune for lora training
# torchtune:
#   model: qwen3_4b_base
#   model_type: QWEN3
#   async_weight_syncing: True

# Other parameters:
# kl_coef: 0.02
# temperature: 0.8

trainer:
  learning_rate: 5e-6
  # Note that per_device_train_batch_size must be divisible by num_generations.
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 1   # if != 1, deadlock occurs
  num_generations: 2

engine:
  gpu_memory_utilization: 0.75
  max_lora_rank: 32
  enable_sleep_mode: true
