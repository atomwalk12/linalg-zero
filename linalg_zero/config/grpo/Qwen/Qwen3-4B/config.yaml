defaults:
  - /training@training: training_schema
  - /run@run: run_schema
  - _self_
  # Note: _self_ at end means local overrides take precedence
  # engine and torchtune configs use plain dicts (TypedDicts from art.dev, not dataclasses)

init:
  max_lora_rank: 32

training:
  trajectories_per_group: 32
  groups_per_step: 4
  learning_rate: 5e-6
  beta: 0.0
  eval_steps: 10
  val_set_size: 60
  training_dataset_size: 32
  num_epochs: 1000
  train_mode: sync_rl

run:
  project_id: 001
  project: linalgzero-grpo
  base_model: Qwen/Qwen3-4B
  env: linear_algebra
  model_provider: hosted_vllm
  user_model_provider: openai
  model: 001
  user_strategy: mathematician
  user_model: gpt-4o
  agent_strategy: tool-calling-rl
  temperature: 1.0
  task_split: test
  log_dir: rl_results
  skip_eval: False
  in_process: True
  val_task_ids: []
  max_assistant_turns: 7

peft:
  r: 32
  lora_alpha: 64

# Use peft instead of torchtune for lora training
# torchtune:
#   model: qwen3_4b_base
#   model_type: QWEN3
#   async_weight_syncing: True

trainer:
  learning_rate: 5e-6
  per_device_train_batch_size: 8

engine:
  gpu_memory_utilization: 0.75
  max_lora_rank: 32
