defaults:
  - /training@training: training_schema
  - /run@run: run_schema
  - _self_
  # Note: _self_ at end means local overrides take precedence
  # engine and torchtune configs use plain dicts (TypedDicts from art.dev, not dataclasses)

init:
  max_lora_rank: 32
  dtype: bfloat16

training:
  trajectories_per_group: 8 # scale first to 16 if memory permits
  groups_per_step: 8 # change to 4 if memory isn't sufficient
  learning_rate: 5e-6
  beta: 0.0 # 0.001
  eval_steps: 8
  val_set_size: 1000
  training_dataset_size: 8000
  num_epochs: 2
  train_mode: sync_rl

run:
  project_id: Qwen2.5-3B-Instruct
  project: linalgzero-grpo
  base_model: Qwen/Qwen2.5-3B-Instruct
  env: linear_algebra
  model_provider: hosted_vllm
  user_model_provider: openai
  model: Qwen2.5-3B-Instruct
  user_strategy: mathematician
  user_model: gpt-4o
  agent_strategy: tool-calling-rl
  temperature: 1.0
  task_split: test
  log_dir: rl_results
  skip_eval: False
  in_process: False
  val_task_ids: [1,2,3]
  max_assistant_turns: 7

peft:
  r: 32
  lora_alpha: 64
  use_gradient_checkpointing: "unsloth"

# Use peft instead of torchtune for lora training
# torchtune:
#   model: qwen3_4b_base
#   model_type: QWEN3
#   async_weight_syncing: True

# Other parameters:
# kl_coef: 0.02
# temperature: 0.8

trainer:
  learning_rate: 5e-6
  # Note that per_device_train_batch_size must be divisible by num_generations.
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 1   # if != 1, deadlock occurs
  num_generations: 2
  max_prompt_length: 6144
  max_completion_length: 2048
  report_to: ["wandb"]
  save_total_limit: 20

engine:
  gpu_memory_utilization: 0.25
  max_lora_rank: 32
  enable_sleep_mode: true
  max_model_len: 8192
